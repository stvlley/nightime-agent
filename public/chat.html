<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="robots" content="noindex" />
<title>Chat</title>
<style>
  :root {
    --bg: #0d0a26; --surface: #1a1640; --surface2: #29235f;
    --primary: #9d7bff; --accent: #c9b5ff; --on-primary: #140f2e;
    --text: #f3f0ff; --muted: #aaa3d7; --border: #332d68;
    --shadow: rgba(3, 2, 12, 0.28);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh; height: 100dvh;
    overflow: hidden;
  }
  header {
    padding: 18px 24px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 10px 30px var(--shadow);
  }
  header .title { font-weight: 750; font-size: 18px; letter-spacing: 0; }
  #log {
    flex: 1; min-height: 0; overflow-y: auto; padding: 22px 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .row { display: flex; width: 100%; }
  .row.visitor { justify-content: flex-end; }
  .message {
    display: flex; flex-direction: column; align-items: flex-start;
    max-width: min(76%, 560px); min-width: 0;
  }
  .visitor .message { align-items: flex-end; max-width: min(68%, 420px); }
  .bubble {
    width: fit-content; max-width: 100%; min-width: 44px;
    padding: 12px 16px; border-radius: 18px; white-space: pre-wrap;
    overflow-wrap: break-word; word-break: normal;
    font-size: 16px; line-height: 1.42;
    box-shadow: 0 8px 22px var(--shadow);
  }
  .agent .bubble { background: var(--surface2); border-bottom-left-radius: 6px; }
  .visitor .bubble {
    background: var(--primary); color: var(--on-primary);
    border-bottom-right-radius: 6px; font-weight: 500;
  }
  .meta { font-size: 12px; color: var(--muted); margin: 0 6px 5px; }
  form {
    display: flex; gap: 12px; padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border); background: rgba(26, 22, 64, 0.96);
  }
  input {
    flex: 1; min-width: 0; padding: 13px 16px; border-radius: 14px; border: 1px solid var(--primary);
    background: var(--bg); color: var(--text); font-size: 16px; outline: none;
  }
  input::placeholder { color: #8f88b4; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(157, 123, 255, 0.18); }
  button {
    min-width: 88px; padding: 0 20px; border: 0; border-radius: 14px; background: var(--primary);
    color: var(--on-primary); font-weight: 750; font-size: 16px; cursor: pointer;
    box-shadow: 0 8px 20px rgba(157, 123, 255, 0.22);
  }
  button:disabled { opacity: .5; cursor: default; }
  .system { align-self: center; font-size: 12px; color: var(--muted); padding: 4px 0; }
  .error { align-self: center; font-size: 12px; color: #ff9d9d; padding: 4px 0; }
  @media (max-width: 520px) {
    header { padding: 16px 18px 18px; }
    #log { padding: 18px; }
    .message { max-width: 82%; }
    .visitor .message { max-width: 74%; }
    form { padding: 14px 12px calc(14px + env(safe-area-inset-bottom)); gap: 10px; }
    button { min-width: 78px; padding: 0 16px; }
  }
</style>
</head>
<body>
  <header>
    <div class="title" id="brand">Chat</div>
  </header>
  <div id="log"></div>
  <form id="composer">
    <input id="text" placeholder="Type a message…" autocomplete="off" maxlength="4000" />
    <button id="send" type="submit">Send</button>
  </form>

<script>
(function () {
  // ---- Config: query params override window.NIGHTIME_CHAT ------------------
  var qs = new URLSearchParams(location.search);
  var cfg = window.NIGHTIME_CHAT || {};
  var slug = qs.get('slug') || cfg.slug;
  var base = (qs.get('base') || cfg.base || 'http://127.0.0.1:54321/functions/v1').replace(/\/$/, '');
  var anonKey = qs.get('key') || cfg.anonKey || '';
  var brand = qs.get('brand') || cfg.brand || 'Chat';
  document.getElementById('brand').textContent = brand;

  var log = document.getElementById('log');
  var form = document.getElementById('composer');
  var input = document.getElementById('text');
  var sendBtn = document.getElementById('send');

  if (!slug) { addError('Misconfigured widget: missing provider slug.'); input.disabled = true; sendBtn.disabled = true; return; }

  // ---- Per-conversation session id (capability to read this thread) -------
  var SKEY = 'nightime_chat_session_' + slug;
  var sessionId = localStorage.getItem(SKEY);
  if (!sessionId) {
    sessionId = (crypto.randomUUID && crypto.randomUUID()) ||
      (Date.now().toString(36) + Math.random().toString(36).slice(2));
    localStorage.setItem(SKEY, sessionId);
  }

  var lastIso = null;
  var seen = {};
  var optimisticVisitorTexts = [];

  function headers() {
    var h = { 'Content-Type': 'application/json' };
    if (anonKey) { h['apikey'] = anonKey; h['Authorization'] = 'Bearer ' + anonKey; }
    return h;
  }
  function atBottom() { return log.scrollHeight - log.scrollTop - log.clientHeight < 60; }
  function scroll() { log.scrollTop = log.scrollHeight; }

  function addBubble(role, text, aiGenerated) {
    var stick = atBottom();
    var row = document.createElement('div'); row.className = 'row ' + role;
    var wrap = document.createElement('div');
    wrap.className = 'message';
    if (role === 'agent') {
      var meta = document.createElement('div'); meta.className = 'meta';
      meta.textContent = 'Provider';
      wrap.appendChild(meta);
    }
    var b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
    wrap.appendChild(b); row.appendChild(wrap); log.appendChild(row);
    if (stick) scroll();
  }
  function addSystem(text) { var d = document.createElement('div'); d.className = 'system'; d.textContent = text; log.appendChild(d); scroll(); }
  function addError(text) { var d = document.createElement('div'); d.className = 'error'; d.textContent = text; log.appendChild(d); scroll(); }

  function renderServerMessages(messages) {
    (messages || []).forEach(function (m) {
      if (seen[m.id]) return; seen[m.id] = true;
      if (m.role === 'visitor') {
        var optimisticIndex = optimisticVisitorTexts.indexOf(m.text);
        if (optimisticIndex >= 0) {
          optimisticVisitorTexts.splice(optimisticIndex, 1);
          if (m.createdAt) lastIso = m.createdAt;
          return;
        }
      }
      addBubble(m.role, m.text, m.aiGenerated);
      if (m.createdAt) lastIso = m.createdAt;
    });
  }

  async function poll() {
    try {
      var res = await fetch(base + '/webchat-poll', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ slug: slug, sessionId: sessionId, afterIso: lastIso })
      });
      if (res.ok) { var data = await res.json(); renderServerMessages(data.messages); }
    } catch (e) { /* transient; next tick retries */ }
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    var text = input.value.trim();
    if (!text) return;
    input.value = ''; sendBtn.disabled = true;
    optimisticVisitorTexts.push(text);
    addBubble('visitor', text, false); // optimistic echo
    try {
      var res = await fetch(base + '/webchat-inbound', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ slug: slug, sessionId: sessionId, text: text })
      });
      var data = await res.json();
      if (!res.ok) { addError(data.error === 'channel_disabled' ? 'This chat is currently offline.' : 'Could not send. Please try again.'); }
      else if (data.reply) { addBubble('agent', data.reply, !!data.aiGenerated); }
      // Sync server-side records (de-duped) so history is consistent on reload.
      await poll();
    } catch (e) { addError('Network error. Please try again.'); }
    finally { sendBtn.disabled = false; input.focus(); }
  });

  // Load prior history for this session, then poll for provider-approved replies.
  poll();
  setInterval(poll, 3000);
  input.focus();
})();
</script>
</body>
</html>
